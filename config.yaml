# ═══════════════════════════════════════════════════════════════
# Auto Cut AI — Default Configuration
# ═══════════════════════════════════════════════════════════════
# All settings here are DEFAULTS. CLI flags always override these.

# ── Directories ─────────────────────────────────────────────────
directories:
  input: input
  output: output
  temp: temp
  music: assets/music
  fonts: assets/fonts

# ── Clip Mode ───────────────────────────────────────────────────
clip:
  mode: long              # long | short
  duration: 60            # seconds (used in short mode)
  size: "16:9"            # 9:16 | 16:9 | 1:1 | 4:5 | WxH
  fps: 30

# ── Silence Removal ──────────────────────────────────────────────
silence:
  enabled: false
  threshold_db: -40       # dB below = silence (-40 default)
  min_silence_ms: 500     # min silent duration to cut (ms)
  padding_ms: 100         # keep N ms of audio around speech

# ── Hook Detection ───────────────────────────────────────────────
hook:
  enabled: false
  duration: 30            # hook clip length in seconds
  use_ai: true            # use AI provider if key configured
  top_k_candidates: 5     # number of audio candidates to score

# ── Subtitles ────────────────────────────────────────────────────
subtitle:
  enabled: false
  style: default          # default | karaoke | box | gradient | minimal
  language: null          # ISO code e.g. 'th', 'en'. null = auto-detect
  whisper_model: base     # tiny | base | small | medium | large
  max_chars_per_line: 40

# ── Background Music ─────────────────────────────────────────────
music:
  enabled: false
  file: null              # path to music file, or null to pick from assets/music/
  volume: 0.15            # BGM volume (0.0 - 1.0)
  ducking: true           # reduce BGM during speech
  duck_volume: 0.07       # BGM volume during speech
  fade_in_sec: 1.0
  fade_out_sec: 2.0
  loop: true

# ── Export Quality ────────────────────────────────────────────────
export:
  crf: 23                 # H.264 CRF (18=high, 23=default, 28=low)
  audio_bitrate: "192k"
  codec: libx264
  audio_codec: aac

# ── AI Provider ──────────────────────────────────────────────────
# Set keys in .env file, not here.
ai:
  provider: null          # null = auto-detect from .env keys
  # openai_model: gpt-4o
  # anthropic_model: claude-3-5-sonnet-20241022
  # gemini_model: gemini-1.5-pro
